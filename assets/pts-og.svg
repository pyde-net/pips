<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif">
  <defs>
    <filter id="ogsh" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.07"/>
    </filter>
    <marker id="ogarw" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0c0c8"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="#ffffff"/>

  <text x="600" y="112" text-anchor="middle" font-size="20" font-weight="600" letter-spacing="4" fill="#9a9aa2">PYDE  ·  RESEARCH NOTE</text>

  <text x="600" y="238" text-anchor="middle" font-size="62" font-weight="800" fill="#16161a">A token you can't</text>
  <text x="600" y="308" text-anchor="middle" font-size="62" font-weight="800" fill="#16161a">implement wrong.</text>

  <text x="600" y="372" text-anchor="middle" font-size="24" fill="#55555c">Nobody writes token code, so nobody can write a token bug.</text>

  <!-- mini flow -->
  <line x1="470" y1="484" x2="516" y2="484" stroke="#cfcfd6" stroke-width="2.2" marker-end="url(#ogarw)"/>
  <line x1="684" y1="484" x2="730" y2="484" stroke="#cfcfd6" stroke-width="2.2" marker-end="url(#ogarw)"/>

  <g filter="url(#ogsh)"><rect x="302" y="452" width="168" height="64" rx="13" fill="#f6f6f7" stroke="#e6e6ea" stroke-width="1.5"/></g>
  <text x="386" y="491" text-anchor="middle" font-size="21" font-weight="600" fill="#17171b">Manifest</text>

  <g filter="url(#ogsh)"><rect x="516" y="452" width="168" height="64" rx="13" fill="#17171b"/></g>
  <text x="600" y="491" text-anchor="middle" font-size="21" font-weight="600" fill="#ffffff">otigen</text>

  <g filter="url(#ogsh)"><rect x="730" y="452" width="168" height="64" rx="13" fill="#f6f6f7" stroke="#e6e6ea" stroke-width="1.5"/></g>
  <text x="814" y="491" text-anchor="middle" font-size="21" font-weight="600" fill="#17171b">Contract</text>

  <text x="600" y="576" text-anchor="middle" font-size="19" fill="#9a9aa2">pyde.network   ·   PIP-0005, the Pyde Token Standard</text>
</svg>
